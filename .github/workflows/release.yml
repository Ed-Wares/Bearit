name: Release Asset Deployment

on:
  release:
    types: [published]

jobs:
  # Trigger the reusable multi-platform Maven builder matrix
  build_release_binary:
    uses: ./.github/workflows/build.yml
    with:
      git_ref: ${{ github.ref }} 
      version_string: ${{ github.event.release.tag_name }} 
      app_version: ${{ github.event.release.tag_name }}

  # Extract compiled binaries from all OS matrices and deploy them to the Release asset slot
  upload_to_release:
    needs: build_release_binary
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create Merged Asset Workspace Directory
        run: mkdir -p release_payload

      # Fetch Windows Artifacts
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: compiled-bearit-package-windows-latest-${{ github.event.release.tag_name }}
          path: release_payload/

      # Fetch macOS Intel Artifacts
      - name: Download macOS Intel Artifact
        uses: actions/download-artifact@v4
        with:
          name: compiled-bearit-package-macos-15-intel-${{ github.event.release.tag_name }}
          path: release_payload/

      # Fetch macOS Apple Silicon Artifacts
      - name: Download macOS Apple Silicon Artifact
        uses: actions/download-artifact@v4
        with:
          name: compiled-bearit-package-macos-14-${{ github.event.release.tag_name }}
          path: release_payload/

      # Fetch Linux Artifacts
      - name: Download Ubuntu Artifact
        uses: actions/download-artifact@v4
        with:
          name: compiled-bearit-package-ubuntu-22.04-${{ github.event.release.tag_name }}
          path: release_payload/

      # Publish everything to the user-facing release hub
      - name: Upload Assets to Github Release Page
        uses: softprops/action-gh-release@v2
        with:
          # This glob pattern grabs the jar, exe, dmg, and AppImage packages simultaneously out of the workspace
          files: |
            release_payload/*.jar
            release_payload/*.exe
            release_payload/*.dmg
            release_payload/*.deb
            release_payload/*.AppImage